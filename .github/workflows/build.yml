name: Build IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project Calc.xcodeproj \
            -scheme Calc \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package into .ipa
        run: |
          APP="build/Build/Products/Release-iphoneos/Calc.app"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qr Calc.ipa Payload
          ls -la Calc.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Calc-ipa
          path: Calc.ipa
