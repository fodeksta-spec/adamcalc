name: Calc
options:
  bundleIdPrefix: com.feathercalc
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

settings:
  base:
    CODE_SIGNING_ALLOWED: "NO"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGN_IDENTITY: ""

targets:
  Calc:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Calc
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.feathercalc.app
        GENERATE_INFOPLIST_FILE: "NO"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_VERSION: "5.0"
